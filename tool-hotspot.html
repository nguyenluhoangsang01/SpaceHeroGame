<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Công cụ tạo Hotspot - Space Hero</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #00d2d3;
        --primary-hover: #00b894;
        --bg-dark: #0f172a;
        --panel-bg: #1e293b;
        --danger: #ff4757;
        --warning: #f59e0b;
        --success: #10b981;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
      }

      /* ÉP GIAO DIỆN VỪA KHÍT 1 MÀN HÌNH (100vh) */
      body {
        font-family: "Nunito", sans-serif;
        margin: 0;
        padding: 15px 20px;
        background: var(--bg-dark);
        color: var(--text-main);
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        overflow-x: hidden; /* Chống cuộn trang toàn cục */
      }

      .title-glow {
        color: var(--primary);
        font-size: 1.8rem;
        font-weight: 900;
        margin: 0 0 10px 0;
        text-transform: uppercase;
        text-shadow: 0 0 10px rgba(0, 210, 211, 0.4);
        text-align: center;
        flex-shrink: 0;
      }

      /* PANEL ĐIỀU KHIỂN NẰM NGANG CHO GỌN */
      .control-panel {
        width: 100%;
        background: var(--panel-bg);
        padding: 15px 20px;
        border-radius: 12px;
        border: 1px solid #334155;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        margin-bottom: 10px;
        flex-shrink: 0;
        box-sizing: border-box;
      }

      .input-row {
        display: flex;
        gap: 20px;
        align-items: center;
        flex-wrap: wrap;
      }

      .input-group {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .input-group label {
        font-weight: 800;
        color: var(--warning);
        font-size: 1rem;
      }

      input[type="text"] {
        width: 250px;
        padding: 8px 12px;
        border-radius: 6px;
        border: 2px solid #334155;
        background: #0f172a;
        color: white;
        font-size: 0.95rem;
        transition: 0.3s;
      }
      input[type="text"]:focus {
        outline: none;
        border-color: var(--primary);
      }

      /* NÚT CHỌN FILE ĐÃ FIX MÀU CHỮ */
      input[type="file"] {
        display: none;
      }
      .custom-file-upload {
        background: var(--primary);
        color: #0f172a !important; /* Fix chữ bị chói */
        padding: 8px 15px;
        border-radius: 6px;
        font-weight: 900;
        cursor: pointer;
        transition: 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }
      .custom-file-upload:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
      }

      button {
        padding: 8px 15px;
        cursor: pointer;
        background: var(--primary);
        color: #0f172a !important; /* Fix chữ bị chói */
        border: none;
        font-weight: 900;
        border-radius: 6px;
        transition: 0.2s;
        font-family: "Nunito", sans-serif;
        font-size: 0.95rem;
      }
      button:hover {
        transform: translateY(-1px);
      }

      button.undo-btn {
        background: var(--warning);
      }
      button.undo-btn:hover {
        background: #d97706;
      }
      button.clear-btn {
        background: var(--danger);
        color: white !important;
      }
      button.clear-btn:hover {
        background: #e11d48;
      }

      .help-text {
        color: var(--text-muted);
        font-size: 0.95rem;
        margin: 10px 0 0 0;
        padding-top: 10px;
        border-top: 1px solid #334155;
      }
      .help-text b {
        color: var(--primary);
      }

      /* VÙNG CHỨA ẢNH & PLACEHOLDER (CÓ THỂ CUỘN BÊN TRONG) */
      .workspace-wrapper {
        flex: 1; /* Chiếm toàn bộ khoảng trống còn lại ở giữa */
        width: 100%;
        background: var(--panel-bg);
        border-radius: 12px;
        border: 2px solid #334155;
        overflow: auto; /* Sinh thanh cuộn TẠI ĐÂY nếu ảnh to */
        display: flex;
        justify-content: center;
        align-items: center; /* Căn giữa Placeholder */
        position: relative;
      }

      #workspace {
        position: relative;
        display: none; /* Ẩn khi chưa có ảnh */
        user-select: none;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      }

      #target-img {
        max-width: 1200px; /* Giới hạn độ to tối đa của ảnh */
        pointer-events: none;
        display: block;
      }

      /* KHUNG PLACEHOLDER MẶC ĐỊNH */
      #placeholder {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        border: 3px dashed #475569;
        border-radius: 10px;
        background: rgba(15, 23, 42, 0.5);
        width: 80%;
        height: 80%;
        max-height: 300px;
      }
      #placeholder .icon {
        font-size: 4rem;
        margin-bottom: 5px;
        opacity: 0.6;
      }
      #placeholder h3 {
        margin: 0 0 5px 0;
        color: #cbd5e1;
        font-size: 1.3rem;
      }
      #placeholder p {
        margin: 0;
        font-size: 0.95rem;
      }

      #workspace.ready {
        cursor: crosshair;
      }

      /* CÁC Ô VẼ */
      .drawing-box {
        position: absolute;
        border: 2px dashed var(--primary);
        background: rgba(0, 210, 211, 0.2);
        display: none;
        pointer-events: none;
      }
      .final-box {
        position: absolute;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 900;
        font-size: 1.2rem;
        text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
        cursor: pointer;
        transition: 0.1s;
        border-radius: 4px;
        box-shadow: 0 0 8px rgba(0, 0, 0, 0.5);
      }
      .final-box:hover {
        transform: scale(1.05);
        z-index: 10;
        border-width: 3px !important;
      }

      /* KHU VỰC KẾT QUẢ VÀ NÚT COPY (CỐ ĐỊNH Ở ĐÁY) */
      .code-section {
        width: 100%;
        height: 180px; /* Cố định chiều cao */
        flex-shrink: 0; /* Không bị bóp méo */
        background: var(--panel-bg);
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 15px 20px;
        box-sizing: border-box;
        margin-top: 10px;
        display: flex;
        flex-direction: column;
      }
      .code-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }
      .code-header h3 {
        margin: 0;
        color: var(--primary);
        font-size: 1.2rem;
      }

      .copy-btn {
        background: var(--success);
        color: white !important;
        padding: 6px 20px;
      }
      .copy-btn:hover {
        background: #059669;
      }

      textarea {
        flex: 1;
        width: 100%;
        font-family: "Consolas", monospace;
        background: #000;
        color: var(--primary);
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #334155;
        font-size: 1.05rem;
        box-sizing: border-box;
        resize: none; /* Khóa kéo ranh giới chữ */
      }
      textarea:focus {
        outline: none;
        border-color: var(--primary);
      }

      /* MÀN HÌNH CHỜ KÉO THẢ FILE */
      #drag-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(15, 23, 42, 0.9);
        z-index: 9999;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        pointer-events: none;
        backdrop-filter: blur(5px);
        border: 5px dashed var(--primary);
        box-sizing: border-box;
      }
      #drag-overlay .icon {
        font-size: 5rem;
        margin-bottom: 10px;
        animation: bounce 1s infinite alternate;
      }
      #drag-overlay h1 {
        font-size: 3rem;
        color: var(--primary);
        margin: 0;
        text-transform: uppercase;
      }
      @keyframes bounce {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-15px);
        }
      }
      body.drag-active #drag-overlay {
        display: flex;
      }
    </style>
  </head>
  <body>
    <div id="drag-overlay">
      <div class="icon">📥</div>
      <h1>THẢ ẢNH VÀO ĐÂY</h1>
    </div>

    <h2 class="title-glow">🎯 CÔNG CỤ TẠO HOTSPOT</h2>

    <div class="control-panel">
      <div class="input-row">
        <div class="input-group">
          <label>📁 Tải ảnh từ máy:</label>
          <label class="custom-file-upload">
            <input
              type="file"
              id="img-file"
              accept="image/*"
              onchange="uploadImage(event)"
            />
            📤 Chọn File Ảnh
          </label>
        </div>

        <div class="input-group">
          <label>🔗 Hoặc Link ảnh:</label>
          <input type="text" id="img-url" placeholder="Dán link (URL)..." />
          <button onclick="loadImage()">🌐 Tải từ Link</button>
        </div>

        <div class="input-group" style="margin-left: auto">
          <button class="undo-btn" onclick="undoLast()">↩️ Hoàn tác</button>
          <button class="clear-btn" onclick="clearAll(true)">
            🗑️ Xóa làm lại
          </button>
        </div>
      </div>

      <p class="help-text">
        💡 <b>Mẹo:</b> Kéo thả file ảnh vào web. Kéo chuột để vẽ khung.
        <b>Click vào khung</b> để đổi ĐÚNG (Xanh) / SAI (Đỏ). (Phím tắt:
        <b>Ctrl+Z</b>)
      </p>
    </div>

    <div class="workspace-wrapper" id="wrapper">
      <div id="placeholder">
        <div class="icon">🖼️</div>
        <h3>Chưa có dữ liệu ảnh</h3>
        <p>Kéo thả ảnh vào đây để bắt đầu</p>
      </div>

      <div id="workspace">
        <img id="target-img" src="" alt="" />
        <div id="drawing-box" class="drawing-box"></div>
      </div>
    </div>

    <div class="code-section">
      <div class="code-header">
        <h3>💻 Mã Code Kết Quả</h3>
        <button class="copy-btn" id="copy-btn" onclick="copyCode()">
          📋 Copy Code
        </button>
      </div>
      <textarea
        id="output-code"
        readonly
        placeholder="[ Code JSON của Hotspot sẽ tự động xuất hiện tại đây ]"
      ></textarea>
    </div>

    <script>
      const wrapper = document.getElementById("wrapper");
      const workspace = document.getElementById("workspace");
      const placeholder = document.getElementById("placeholder");
      const img = document.getElementById("target-img");
      const drawingBox = document.getElementById("drawing-box");
      const outputCode = document.getElementById("output-code");
      const copyBtn = document.getElementById("copy-btn");

      let isDrawing = false;
      let startX = 0,
        startY = 0;
      let hotspots = [];

      // FIX LỖI ICON VỠ: Điều hướng hiển thị Placeholder hoặc Image
      function setImageReady(isReady) {
        if (isReady) {
          workspace.style.display = "inline-block";
          placeholder.style.display = "none";
          workspace.classList.add("ready");
          // Cho cuộn về góc trên bên trái
          wrapper.scrollTop = 0;
          wrapper.scrollLeft = 0;
        } else {
          workspace.style.display = "none";
          placeholder.style.display = "flex";
          workspace.classList.remove("ready");
          img.removeAttribute("src"); // Xóa src để ko bị lỗi vỡ ảnh
        }
      }

      // Kéo thả file
      window.addEventListener("dragover", (e) => {
        e.preventDefault();
        document.body.classList.add("drag-active");
      });
      window.addEventListener("dragleave", (e) => {
        e.preventDefault();
        if (!e.relatedTarget) document.body.classList.remove("drag-active");
      });
      window.addEventListener("drop", (e) => {
        e.preventDefault();
        document.body.classList.remove("drag-active");
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
          const file = e.dataTransfer.files[0];
          if (file.type.startsWith("image/")) processImageFile(file);
          else alert("⚠️ Vui lòng thả file định dạng hình ảnh (JPG, PNG...)!");
        }
      });

      function processImageFile(file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          clearAll(false);
          img.src = e.target.result;
          document.getElementById("img-url").value = "";
          setImageReady(true);
        };
        reader.readAsDataURL(file);
      }

      function uploadImage(event) {
        if (event.target.files[0]) processImageFile(event.target.files[0]);
        event.target.value = "";
      }

      function loadImage() {
        const url = document.getElementById("img-url").value;
        if (url) {
          clearAll(false);
          img.src = url;
          setImageReady(true);
        }
      }

      // Sự kiện vẽ
      workspace.addEventListener("mousedown", (e) => {
        if (!workspace.classList.contains("ready")) return;
        isDrawing = true;
        const rect = img.getBoundingClientRect();
        startX = e.clientX - rect.left;
        startY = e.clientY - rect.top;

        drawingBox.style.left = startX + "px";
        drawingBox.style.top = startY + "px";
        drawingBox.style.width = "0px";
        drawingBox.style.height = "0px";
        drawingBox.style.display = "block";
      });

      workspace.addEventListener("mousemove", (e) => {
        if (!isDrawing) return;
        const rect = img.getBoundingClientRect();
        let currentX = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
        let currentY = Math.max(0, Math.min(e.clientY - rect.top, rect.height));

        let x = Math.min(startX, currentX);
        let y = Math.min(startY, currentY);
        let w = Math.abs(currentX - startX);
        let h = Math.abs(currentY - startY);

        drawingBox.style.left = x + "px";
        drawingBox.style.top = y + "px";
        drawingBox.style.width = w + "px";
        drawingBox.style.height = h + "px";
      });

      workspace.addEventListener("mouseup", (e) => {
        if (!isDrawing) return;
        isDrawing = false;
        drawingBox.style.display = "none";

        const rect = img.getBoundingClientRect();
        let currentX = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
        let currentY = Math.max(0, Math.min(e.clientY - rect.top, rect.height));

        let w = Math.abs(currentX - startX);
        let h = Math.abs(currentY - startY);

        if (w < 5 || h < 5) return;

        let x = Math.min(startX, currentX);
        let y = Math.min(startY, currentY);

        let percentX = parseFloat(((x / rect.width) * 100).toFixed(1));
        let percentY = parseFloat(((y / rect.height) * 100).toFixed(1));
        let percentW = parseFloat(((w / rect.width) * 100).toFixed(1));
        let percentH = parseFloat(((h / rect.height) * 100).toFixed(1));

        let isCorrect = hotspots.length === 0;
        hotspots.push({
          x: percentX,
          y: percentY,
          w: percentW,
          h: percentH,
          isCorrect: isCorrect,
        });
        renderBoxes();
      });

      function copyCode() {
        if (outputCode.value === "") return;
        outputCode.select();
        outputCode.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(outputCode.value).then(() => {
          copyBtn.innerHTML = "✅ Đã Copy!";
          copyBtn.style.background = "var(--warning)";
          copyBtn.style.color = "#000";
          setTimeout(() => {
            copyBtn.innerHTML = "📋 Copy Code";
            copyBtn.style.background = "var(--success)";
            copyBtn.style.color = "white";
          }, 2000);
        });
      }

      function undoLast() {
        if (hotspots.length > 0) {
          hotspots.pop();
          renderBoxes();
        }
      }

      document.addEventListener("keydown", function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === "z") {
          e.preventDefault();
          undoLast();
        }
      });

      function renderBoxes() {
        document.querySelectorAll(".final-box").forEach((el) => el.remove());

        hotspots.forEach((spot, index) => {
          let box = document.createElement("div");
          box.className = "final-box";
          box.style.left = spot.x + "%";
          box.style.top = spot.y + "%";
          box.style.width = spot.w + "%";
          box.style.height = spot.h + "%";

          if (spot.isCorrect) {
            box.style.border = "2px solid var(--success)";
            box.style.background = "rgba(16, 185, 129, 0.4)";
            box.innerText = "✓";
          } else {
            box.style.border = "2px solid var(--danger)";
            box.style.background = "rgba(255, 71, 87, 0.4)";
            box.innerText = "✗";
          }

          box.addEventListener("click", function (e) {
            e.stopPropagation();
            hotspots[index].isCorrect = !hotspots[index].isCorrect;
            renderBoxes();
          });

          workspace.appendChild(box);
        });

        generateCode();
      }

      function generateCode() {
        if (hotspots.length === 0) {
          outputCode.value = "";
          return;
        }
        let code = "hotspots: [\n";
        hotspots.forEach((spot, index) => {
          let isCorrectStr = spot.isCorrect ? "true " : "false";
          code += `  { x: ${spot.x}, y: ${spot.y}, w: ${spot.w}, h: ${spot.h}, isCorrect: ${isCorrectStr} }, // Ô số ${index + 1}\n`;
        });
        code += "]";
        outputCode.value = code;
      }

      function clearAll(resetImage = true) {
        hotspots = [];
        if (resetImage) setImageReady(false);
        renderBoxes();
      }
    </script>
  </body>
</html>
